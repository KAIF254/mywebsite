<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>My Website</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body {
      margin: 0;
      font-family: Arial;
    }

    /* Navbar */
    .navbar {
      background: #0d6efd;
      padding: 15px;
      color: white;
      display: flex;
      justify-content: space-between;
    }

    .navbar a {
      color: white;
      margin: 0 10px;
      text-decoration: none;
    }

    /* Hero */
    .hero {
      text-align: center;
      padding: 60px;
      background: #f4f4f4;
    }

    /* Services */
    .services {
      padding: 40px;
      text-align: center;
    }

    .service-box {
      display: inline-block;
      width: 250px;
      margin: 15px;
      padding: 20px;
      background: #eee;
      border-radius: 10px;
    }

    /* Contact */
    .contact {
      padding: 40px;
      background: #f4f4f4;
      text-align: center;
    }

    input, textarea {
      width: 80%;
      padding: 10px;
      margin: 10px;
    }

    button {
      padding: 10px 20px;
      background: #0d6efd;
      color: white;
      border: none;
    }
  </style>
</head>

<body>

  <!-- Navbar -->
  <div class="navbar">
    <h2>MyBrand</h2>
    <div>
      <a href="#">Home</a>
      <a href="#services">Services</a>
      <a href="#contact">Contact</a>
    </div>
  </div>

  <!-- Hero Section -->
  <div class="hero">
    <h1>Welcome Kaif 🚀</h1>
    <p>Your DevOps Journey Starts Here</p>
  </div>

  <!-- Services -->
  <div class="services" id="services">
    <h2>Our Services</h2>

    <div class="service-box">
      <h3>Web Design</h3>
      <p>Modern responsive websites</p>
    </div>

    <div class="service-box">
      <h3>DevOps</h3>
      <p>CI/CD, Docker, Cloud setup</p>
    </div>

    <div class="service-box">
      <h3>Support</h3>
      <p>24/7 technical support</p>
    </div>
  </div>

  <!-- Contact -->
  <div class="contact" id="contact">
    <h2>Contact Us</h2>

    <input type="text" placeholder="Your Name"><br>
    <input type="email" placeholder="Your Email"><br>
    <textarea placeholder="Your Message"></textarea><br>

    <button>Send</button>
  </div>

</body>
</html>
