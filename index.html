<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>My Website</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body {
      margin: 0;
      font-family: Arial;
    }

    .navbar {
      background: #0d6efd;
      padding: 15px;
      color: white;
      display: flex;
      justify-content: space-between;
    }

    .navbar a {
      color: white;
      margin: 0 10px;
      text-decoration: none;
    }

    .hero {
      text-align: center;
      padding: 60px;
      background: #f4f4f4;
    }

    .services {
      padding: 40px;
      text-align: center;
    }

    .service-box {
      display: inline-block;
      width: 250px;
      margin: 15px;
      padding: 20px;
      background: #eee;
      border-radius: 10px;
    }

    .contact {
      padding: 40px;
      background: #f4f4f4;
      text-align: center;
    }

    input, textarea {
      width: 80%;
      padding: 10px;
      margin: 10px;
    }

    button {
      padding: 10px 20px;
      background: #0d6efd;
      color: white;
      border: none;
      cursor: pointer;
    }

    .ai-section {
      text-align: center;
      padding: 40px;
    }

    img {
      margin-top: 15px;
      max-width: 200px;
    }
  </style>
</head>

<body>

  <!-- Navbar -->
  <div class="navbar">
    <h2>MyBrand</h2>
    <div>
      <a href="#">Home</a>
      <a href="#services">Services</a>
      <a href="#contact">Contact</a>
      <a href="#ai">AI Scan</a>
    </div>
  </div>

  <!-- Hero -->
  <div class="hero">
    <h1>Welcome Kaif 🚀</h1>
    <p>Your DevOps + AI Journey Starts Here</p>
  </div>

  <!-- AI SECTION 🔥 -->
  <div class="ai-section" id="ai">
    <h2>AI Image Scanner 🤖</h2>

    <input type="file" id="upload"><br>
    <img id="preview">
    <h3 id="result"></h3>
  </div>

  <!-- Services -->
  <div class="services" id="services">
    <h2>Our Services</h2>

    <div class="service-box">
      <h3>Web Design</h3>
      <p>Modern responsive websites</p>
    </div>

    <div class="service-box">
      <h3>DevOps</h3>
      <p>CI/CD, Docker, Cloud setup</p>
    </div>

    <div class="service-box">
      <h3>AI Solutions</h3>
      <p>Image recognition & automation</p>
    </div>
  </div>

  <!-- Contact -->
  <div class="contact" id="contact">
    <h2>Contact Us</h2>

    <input type="text" placeholder="Your Name"><br>
    <input type="email" placeholder="Your Email"><br>
    <textarea placeholder="Your Message"></textarea><br>

    <button>Send</button>
  </div>

  <!-- AI SCRIPT -->
  <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs"></script>
  <script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/mobilenet"></script>

  <script>
    let model;

    async function loadModel() {
      model = await mobilenet.load();
      document.getElementById("result").innerText = "Model Loaded ✅";
    }

    loadModel();

    document.getElementById("upload").addEventListener("change", async (e) => {
      const file = e.target.files[0];
      const img = document.getElementById("preview");

      img.src = URL.createObjectURL(file);

      img.onload = async () => {
        const predictions = await model.classify(img);

        document.getElementById("result").innerText =
          "Result: " + predictions[0].className;
      };
    });
  </script>

</body>
</html>
