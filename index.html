<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Catty</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
  margin: 0;
  font-family: 'Segoe UI', sans-serif;
  background: linear-gradient(135deg, #1e1e2f, #2b5876);
  color: white;
}

.navbar {
  display: flex;
  justify-content: space-between;
  padding: 20px;
  background: rgba(0,0,0,0.3);
}

.navbar h2 {
  color: #ffcc70;
}

.navbar a {
  color: white;
  margin: 0 10px;
  text-decoration: none;
  font-weight: bold;
}

.hero {
  text-align: center;
  padding: 80px 20px;
}

.hero h1 {
  font-size: 42px;
  color: #ffcc70;
}

.ai-section {
  text-align: center;
  padding: 50px;
}

.upload-box {
  border: 2px dashed #ffcc70;
  padding: 50px;
  border-radius: 20px;
  cursor: pointer;
  display: inline-block;
}

.upload-box:hover {
  background: rgba(255,255,255,0.1);
}

#upload {
  display: none;
}

#preview {
  display: block;
  margin: 20px auto;
  max-width: 260px;
  border-radius: 15px;
}

.spinner {
  display: none;
  margin: 20px auto;
  border: 4px solid #ccc;
  border-top: 4px solid #ffcc70;
  border-radius: 50%;
  width: 40px;
  height: 40px;
  animation: spin 1s linear infinite;
}

#result {
  margin-top: 20px;
  font-size: 22px;
  color: #00ffcc;
}

@keyframes spin {
  100% { transform: rotate(360deg); }
}

.services {
  padding: 50px;
  text-align: center;
}

.service-box {
  display: inline-block;
  width: 250px;
  margin: 15px;
  padding: 20px;
  background: rgba(255,255,255,0.1);
  border-radius: 15px;
}

.section {
  padding: 50px;
  text-align: center;
}

.contact {
  padding: 40px;
  text-align: center;
}

input, textarea {
  width: 80%;
  padding: 12px;
  margin: 10px;
  border-radius: 10px;
  border: none;
}

button {
  padding: 12px 25px;
  background: #ffcc70;
  color: black;
  border: none;
  border-radius: 10px;
  cursor: pointer;
}

.footer {
  background: rgba(0,0,0,0.5);
  text-align: center;
  padding: 20px;
  margin-top: 30px;
}
</style>
</head>

<body>

<div class="navbar">
  <h2>Catty</h2>
  <div>
    <a href="#">Home</a>
    <a href="#ai">Scan</a>
    <a href="#services">Services</a>
    <a href="#help">Help</a>
    <a href="#contact">Contact</a>
  </div>
</div>

<div class="hero">
  <h1>Welcome to Catty</h1>
  <p>Smart AI Image Detection Platform</p>
</div>

<div class="ai-section" id="ai">

  <label class="upload-box">
    📸 Upload Your Image
    <input type="file" id="upload">
  </label>

  <img id="preview">
  <div class="spinner" id="spinner"></div>
  <div id="result"></div>

</div>

<div class="services" id="services">
  <h2>Our Features</h2>

  <div class="service-box">🖼️ Images</div>
  <div class="service-box">🎥 Videos</div>
  <div class="service-box">🎧 Audio</div>
</div>

<div class="section" id="help">
  <h2>Help Center</h2>
  <p>Upload clear images for better results.</p>
</div>

<div class="contact" id="contact">
  <h2>Contact Us</h2>
  <input placeholder="Name"><br>
  <input placeholder="Email"><br>
  <textarea placeholder="Message"></textarea><br>
  <button>Send</button>
</div>

<div class="footer">
  <p>© 2026 Catty</p>
</div>

<!-- Pose Detection -->
<script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs"></script>
<script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/pose-detection"></script>

<script>
let detector;
let modelLoaded = false;

// Load model properly
async function loadModel() {
  detector = await poseDetection.createDetector(
    poseDetection.SupportedModels.MoveNet
  );
  modelLoaded = true;
  document.getElementById("result").innerText = "Model Ready ✅";
}
loadModel();

// Better detection logic
function detectPose(keypoints) {
  const nose = keypoints.find(p => p.name === "nose");
  const hip = keypoints.find(p => p.name === "left_hip");
  const knee = keypoints.find(p => p.name === "left_knee");

  if (!nose || !hip || !knee) return "Try clear full body image ⚠️";

  if (nose.y > hip.y) return "Sleeping 😴";
  if (hip.y < knee.y) return "Standing 🧍";
  return "Sitting 🪑";
}

// Upload event
document.getElementById("upload").addEventListener("change", async (e) => {

  if (!modelLoaded) {
    alert("Model loading... wait karo ⏳");
    return;
  }

  const file = e.target.files[0];
  const img = document.getElementById("preview");
  const spinner = document.getElementById("spinner");
  const result = document.getElementById("result");

  img.src = URL.createObjectURL(file);

  spinner.style.display = "block";
  result.innerText = "Detecting...";

  img.onload = async () => {
    try {
      const poses = await detector.estimatePoses(img);

      spinner.style.display = "none";

      if (poses.length > 0) {
        result.innerText = detectPose(poses[0].keypoints);
      } else {
        result.innerText = "No person detected ❌";
      }

    } catch (err) {
      spinner.style.display = "none";
      result.innerText = "Error ❌";
      console.log(err);
    }
  };
});
</script>

</body>
</html>
